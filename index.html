<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MELEECITY+ // MANHUNT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;800&family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            cursor: none;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
        }

        /* ФОНОВОЕ ИЗОБРАЖЕНИЕ ГОРОДА (ГЕНЕРИРУЕМ ЧЕРЕЗ SVG — СЕРО-ЧЁРНАЯ ГАММА) */
        .city-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            z-index: 1;
        }

        /* SVG ГОРОДА С ЭФФЕКТОМ ГЛУБИНЫ */
        .city-scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: grayscale(100%) contrast(1.2) brightness(0.7);
        }

        /* ФОНАРНЫЙ СТОЛБ НА ПЕРЕДНЕМ ПЛАНЕ (БЕЗ БЛЮРА) */
        .lamp-post {
            position: fixed;
            bottom: 0;
            right: 80px;
            width: 120px;
            height: 400px;
            z-index: 3;
            pointer-events: none;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }

        /* БЛЮР ДЛЯ ФОНА (ГОРОД) */
        .background-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(4px);
            z-index: 2;
            pointer-events: none;
        }

        /* ЭФФЕКТ КАМЕРЫ НАБЛЮДЕНИЯ */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.1) 50%, rgba(30, 20, 20, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
            animation: camFlicker 0.1s infinite;
            opacity: 0.7;
        }

        .crt-overlay::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0, 0, 0, 0.6) 100%);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.95);
            pointer-events: none;
        }

        /* ВИНЬЕТКА */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 25%, #000000 95%);
            pointer-events: none;
            z-index: 11;
            opacity: 0.8;
        }

        /* СКАН-ЛАЙН КАМЕРЫ */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(200, 200, 200, 0.08);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 12;
            animation: scanMove 5s linear infinite;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 50% 50%, rgba(0,0,0,0.05) 0%, rgba(30,30,30,0.15) 10%);
            pointer-events: none;
            z-index: 9;
            mix-blend-mode: overlay;
            animation: grain 0.4s steps(6) infinite;
        }

        .container {
            position: relative;
            z-index: 20;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }

        /* REC ИНДИКАТОР */
        .rec {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #cc1111;
            font-family: 'Oxanium', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 20px #ff0000;
            opacity: 0.95;
            z-index: 30;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 14px;
            border: 1px solid rgba(180, 20, 20, 0.5);
            border-radius: 2px;
            backdrop-filter: blur(2px);
        }

        .rec-dot {
            width: 12px;
            height: 12px;
            background: #cc1111;
            border-radius: 50%;
            box-shadow: 0 0 25px #ff0000;
            animation: pulse 1s infinite;
        }

        /* ИНФО КАМЕРЫ */
        .camera-info {
            position: absolute;
            top: 25px;
            left: 35px;
            color: #aaa;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            text-shadow: 0 0 8px #888;
            opacity: 0.9;
            z-index: 30;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 18px;
            border: 1px solid rgba(150, 150, 150, 0.3);
            border-radius: 2px;
            backdrop-filter: blur(2px);
            line-height: 1.5;
        }

        .camera-id {
            color: #ccc;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .camera-coords {
            color: #999;
            font-size: 0.7rem;
        }

        /* ЗАГОЛОВОК */
        .title-block {
            text-align: center;
            margin-bottom: 40px;
            padding: 15px 50px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(120, 120, 120, 0.25);
            border-left: 4px solid #888;
            border-right: 4px solid #888;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            transform: skew(-2deg);
        }

        .main-title {
            font-family: 'Oxanium', sans-serif;
            font-weight: 800;
            font-size: 5.5rem;
            letter-spacing: 18px;
            color: #ddd;
            text-shadow: 4px 4px 0 #1a1a1a, 8px 8px 20px #000;
            line-height: 1;
        }

        .main-title span {
            color: #aaa;
            text-shadow: 4px 4px 0 #111, 0 0 30px #666;
        }

        /* ПРОГРЕСС-БАР */
        .progress-container {
            width: 500px;
            margin-top: 50px;
            position: relative;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 0.8rem;
            letter-spacing: 4px;
            margin-bottom: 6px;
            padding: 0 5px;
            text-shadow: 0 0 5px black;
        }

        .progress-bar-bg {
            height: 8px;
            background: #111;
            border: 1px solid #444;
            box-shadow: inset 0 0 15px #000, 0 0 8px rgba(100, 100, 100, 0.2);
            position: relative;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #555, #888, #aaa, #888);
            box-shadow: 0 0 15px #aaa;
            transition: width 0.15s linear;
            position: relative;
        }

        #progress-fill::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: scan 1.5s infinite;
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .info-grid {
            position: absolute;
            bottom: 25px;
            left: 35px;
            right: 35px;
            display: flex;
            justify-content: space-between;
            color: #999;
            font-size: 0.85rem;
            border-top: 1px solid #333;
            padding-top: 15px;
            text-transform: uppercase;
            z-index: 30;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
        }

        .map-info {
            display: flex;
            gap: 20px;
        }

        .map-label {
            color: #888;
        }

        .map-name {
            color: #ccc;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .player-info {
            display: flex;
            gap: 15px;
        }

        .player-count {
            color: #aaa;
            font-weight: bold;
        }

        .timestamp {
            color: #888;
            letter-spacing: 3px;
        }

        /* РАМКА УГЛОВ */
        .corner-lines {
            position: fixed;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px solid rgba(100, 100, 100, 0.15);
            pointer-events: none;
            z-index: 25;
        }

        .corner-lines::before,
        .corner-lines::after {
            content: "";
            position: absolute;
            width: 25px;
            height: 25px;
            border-color: #777;
            border-style: solid;
            opacity: 0.5;
        }

        .corner-lines::before {
            top: -1px;
            left: -1px;
            border-width: 2px 0 0 2px;
        }

        .corner-lines::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
        }

        /* ПЕРЕКРЕСТИЕ */
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 26;
            opacity: 0.2;
        }

        .crosshair::before,
        .crosshair::after {
            content: "";
            position: absolute;
            background: rgba(180, 180, 180, 0.4);
        }

        .crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            transform: translateY(-50%);
        }

        .crosshair::after {
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
            transform: translateX(-50%);
        }

        /* ЗУМ ИНДИКАТОР */
        .zoom-indicator {
            position: absolute;
            bottom: 60px;
            right: 35px;
            color: #999;
            font-size: 0.7rem;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border: 1px solid #444;
            z-index: 30;
        }

        /* АНИМАЦИИ */
        @keyframes camFlicker {
            0% { opacity: 0.7; transform: translateY(0); }
            3% { opacity: 0.6; transform: translateY(1px); }
            6% { opacity: 0.75; }
            10% { opacity: 0.65; }
            20% { opacity: 0.7; }
            50% { opacity: 0.65; }
            80% { opacity: 0.75; }
            100% { opacity: 0.7; }
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-2%, -3%); }
            20% { transform: translate(-5%, 2%); }
            30% { transform: translate(3%, -6%); }
            40% { transform: translate(-2%, 8%); }
            50% { transform: translate(-5%, 3%); }
            60% { transform: translate(5%, 0%); }
            70% { transform: translate(0%, 5%); }
            80% { transform: translate(1%, 10%); }
            90% { transform: translate(-3%, 3%); }
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        @keyframes scanMove {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
    </style>
</head>

    <script>
        (function() {
            // DOM элементы
            const fill = document.getElementById('progress-fill');
            const percentEl = document.getElementById('progress-percent');
            const fileCountEl = document.getElementById('file-count');
            const statusText = document.getElementById('status-text');
            const downloadInfo = document.getElementById('download-info');
            const mapElement = document.getElementById('current-map');
            const playerCountEl = document.getElementById('player-count');
            const timestampEl = document.getElementById('live-timestamp');
            
            // Обновление времени
            function updateTimestamp() {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                if (timestampEl) {
                    timestampEl.textContent = `${hours}:${minutes}:${seconds}`;
                }
            }
            setInterval(updateTimestamp, 1000);
            updateTimestamp();
            
            // Переменные состояния
            let lastPercent = 0;
            let serverMap = 'Z-CITY_UNDERPASS';
            let maxPlayers = 32;
            let currentPlayers = 0;
            let downloadTotal = 0;
            let downloadCurrent = 0;
            
            // Обновление количества игроков
            function updatePlayerCount() {
                const serverIP = window.location.hostname || 'localhost';
                const serverPort = window.location.port || '27015';
                
                fetch(`https://api.servers4.net/api/server/${serverIP}:${serverPort}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data && data.players !== undefined) {
                            currentPlayers = data.players;
                            maxPlayers = data.maxplayers || maxPlayers;

            function updateProgress() {

                    if (typeof LoadingProgress !== 'undefined' && LoadingProgress.total > 0) {

                        if (percent > lastPercent) lastPercent = percent;
                        else percent = lastPercent;

<script>

(function() {
    const fill = document.getElementById('progress-fill');
    const percentEl = document.getElementById('progress-percent');
    const fileCountEl = document.getElementById('file-count');
    const statusText = document.getElementById('status-text');
    const downloadInfo = document.getElementById('download-info');
    const mapElement = document.getElementById('current-map');
    const playerCountEl = document.getElementById('player-count');
    const timestampEl = document.getElementById('live-timestamp');

    function updateTimestamp() {
        const now = new Date();
        timestampEl.textContent =
            String(now.getHours()).padStart(2,'0') + ':' +
            String(now.getMinutes()).padStart(2,'0') + ':' +
            String(now.getSeconds()).padStart(2,'0');
    }
    setInterval(updateTimestamp, 1000);
    updateTimestamp();

    let lastPercent = 0;
    let serverMap = 'Z-CITY_UNDERPASS';
    let maxPlayers = 32;
    let currentPlayers = 0;
    let downloadTotal = 0;
    let downloadCurrent = 0;

    // 🔥 СИНХРОНИЗАЦИЯ SUBJECTS С ИГРОКАМИ
    function updatePlayerCount() {
        const serverIP = window.location.hostname || 'localhost';
        const serverPort = window.location.port || '27015';

        fetch(`https://api.servers4.net/api/server/${serverIP}:${serverPort}`)
            .then(res => res.json())
            .then(data => {
                if (data && data.players !== undefined) {
                    currentPlayers = data.players;
                    maxPlayers = data.maxplayers || maxPlayers;

                    // 👉 SUBJECTS = ИГРОКИ
                    playerCountEl.textContent = `${currentPlayers}/${maxPlayers}`;
                }
            })
            .catch(() => {
                playerCountEl.textContent = `0/${maxPlayers}`;
            });
    }

    // 🎮 GARRY'S MOD CALLBACK
    window.GameDetails = function(servername, serverurl, mapname, maxplayers) {
        serverMap = mapname || 'Z-CITY_UNDERPASS';
        maxPlayers = maxplayers || 32;

        mapElement.textContent = serverMap.toUpperCase().replace(/_/g, ' ');

        // 👉 сразу 0 субъектов
        currentPlayers = 0;
        playerCountEl.textContent = `0/${maxPlayers}`;

        updatePlayerCount();
        setInterval(updatePlayerCount, 5000);
    };

    window.SetFilesTotal = function(total) {
        downloadTotal = total;
        fileCountEl.textContent = `// 0/${total} PKTS`;
    };

    window.DownloadingFile = function(fileName) {
        downloadCurrent++;
        if (downloadTotal > 0) {
            fileCountEl.textContent = `// ${downloadCurrent}/${downloadTotal} PKTS`;
        }
        downloadInfo.textContent = `FETCHING: ${fileName.split('/').pop()}`;
    };

    window.SetStatusChanged = function(status) {
        statusText.textContent = status.toUpperCase();
        downloadInfo.textContent = status;
    };

    window.SetFilesNeeded = function(needed) {
        const downloaded = downloadTotal - needed;
        if (downloadTotal > 0) {
            fileCountEl.textContent = `// ${downloaded}/${downloadTotal} PKTS`;
        }
    };

    function updateProgress() {
        if (typeof LoadingProgress !== 'undefined' && LoadingProgress.total > 0) {
            let percent = Math.floor((LoadingProgress.current / LoadingProgress.total) * 100);
            if (percent > lastPercent) lastPercent = percent;

            fill.style.width = percent + '%';
            percentEl.innerText = percent + '%';
        }
        requestAnimationFrame(updateProgress);
    }

    requestAnimationFrame(updateProgress);

    // стартовые значения
    mapElement.textContent = serverMap.toUpperCase().replace(/_/g, ' ');
    playerCountEl.textContent = `0/${maxPlayers}`;

})();
</script>
